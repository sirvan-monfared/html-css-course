<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

    <title>Carousel</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Inter, sans-serif;
            color: #343a40;
            line-height: 1;
        }
        img {
            height: 200px;

            transform: scale(1.5);
            box-shadow: 0 12px 24px rgba(0,0,0,0.25);
        }
        .carousel {
            background-color: #087f5b;
            width: 800px;
            margin: 100px auto;
            border-radius: 8px;
            color: #fff;

            display: flex;
            align-items: center;
            gap: 86px;
            padding: 32px 48px 32px 86px;


            position: relative;
        }
        .testimonial-text {
            font-size: 18px;
            font-weight: 500;
            line-height: 1.5;
            margin-bottom: 32px;
            color: #e6fcf5;
        }
        .testimonial-author {
            font-size: 14px;
            margin-bottom: 4px;
            color: #c3fae8;
        }
        .testimonial-job {
            font-size: 12px;
            color: #c3fae8;
        }
        .btn {
            background-color: #fff;
            border: none;
            height: 40px;
            width: 40px;
            border-radius: 50%;
            box-shadow: 0 12px 24px rgba(0,0,0,0.2);
            cursor: pointer;

            position: absolute;
            top: 50%;

            display: flex;
            justify-content: center;
            align-items: center;
        }
        .btn-icon {
            height: 24px;
            width: 24px;
            stroke: #087f5b;
        }
        .btn--left {
            left: 0;
            transform: translate(-50%, -50%);
        }   
        .btn--right {
            right: 0;
            transform: translate(50%, -50%);
        }
        .dots {
            position: absolute;
            left: 50%;
            bottom: -32px;
            transform: translate(-50%, 0);

            display: flex;
            justify-content: center;
            gap: 12px;
            align-items: center;
        }
        .dot {
            height: 12px;
            width: 12px;
            background-color: #fff;
            border: 2px solid #087f5b;
            border-radius: 50%;
            cursor: pointer;
        }
        .dot--fill {
            background-color: #087f5b;
        }
    </style>
</head>
<body>
    <div class="carousel">
        <img src="emma.jpg" alt="emma">

        <blockquote class="testimonial">
            <p class="testimonial-text">
                Lorem ipsum dolor sit amet consectetur adipisicing elit. Sapiente sed maxime, autem corporis adipisci saepe non expedita assumenda nisi cum omnis, ab similique dolor fugit. Sint suscipit accusantium nemo odio.
            </p>
            <div class="testimonial-author">
                Emma Watson
            </div>
            <div class="testimonial-job">
                Actor, Harry Potter Series
            </div>
        </blockquote>

        <button type="button" class="btn btn--left">
            <svg xmlns="http://www.w3.org/2000/svg" class="btn-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
            </svg>
        </button>
        <button type="button" class="btn btn--right">
            <svg xmlns="http://www.w3.org/2000/svg" class="btn-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
              </svg>
        </button>

        <div class="dots">
            <div class="dot dot--fill">&nbsp;</div>
            <div class="dot">&nbsp;</div>
            <div class="dot">&nbsp;</div>
            <div class="dot">&nbsp;</div>
        </div>
    </div>
</body>
</html>
